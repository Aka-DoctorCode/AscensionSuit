name: Package and Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'
  repository_dispatch:
    types:
      - update-suite

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ----- Solo para dispatch: preparamos changelog y empaquetamos con versión personalizada -----
      - name: Prepare Changelog for Triggered Update
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Update for changes to ${{ github.event.client_payload.trigger || 'TriggerAddon' }}" > changelog.txt

      - name: Package from Triggered Update
        if: github.event_name == 'repository_dispatch'
        uses: BigWigsMods/packager@v2
        with:
          args: "-e changelog.txt -r"
        env:
          VERSION: "${{ github.event.client_payload.trigger }}-${{ github.event.client_payload.version }}"
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      # ----- Solo para push de tags: empaquetado normal -----
      - name: Package from Tag
        if: github.event_name != 'repository_dispatch'
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}