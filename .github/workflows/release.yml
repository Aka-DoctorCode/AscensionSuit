name: Package and Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'
  repository_dispatch:
    types:
      - update-suite

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 1. Calculamos el tag y preparamos el entorno
      - name: Create Automatic VN+1 Tag
        if: github.event_name == 'repository_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch --tags

          LATEST_TAG=$(git describe --tags --abbrev=0 --match "V[0-9]*" 2>/dev/null || echo "V0")
          VERSION_NUM=${LATEST_TAG#V}
          NEXT_NUM=$((VERSION_NUM + 1))
          NEW_TAG="V$NEXT_NUM"
          
          git tag $NEW_TAG
          git push origin $NEW_TAG

          echo "Update for changes to ${{ github.event.client_payload.trigger || 'TriggerAddon' }} (${{ github.event.client_payload.version || 'latest' }})" > CHANGELOG.txt

      # 2. Empaquetar y Desplegar
      - name: Package and Deploy
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}